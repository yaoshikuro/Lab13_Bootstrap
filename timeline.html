<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline - Abbasov</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="custom.css">
</head>
<body>
<div class="container my-5">
    <h2 class="text-center mb-5">Моя История</h2>
    <div class="timeline">
        <div class="timeline-item">
            <div class="timeline-content">
                <span class="badge bg-primary mb-2">2023</span>
                <h5>Поступление в университет</h5>
                <p class="text-muted">Начал изучать веб-разработку</p>
            </div>
        </div>
        <div class="timeline-item timeline-item-left">
            <div class="timeline-content">
                <span class="badge bg-success mb-2">2024</span>
                <h5>Первый сайт</h5>
                <p class="text-muted">Создал сайт на HTML/CSS</p>
            </div>
        </div>
        <div class="timeline-item">
            <div class="timeline-content">
                <span class="badge bg-warning mb-2">2025</span>
                <h5>Изучение Bootstrap</h5>
                <p class="text-muted">Освоил фреймворк</p>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
