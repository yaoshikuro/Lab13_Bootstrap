<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Experiment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card:hover {
            transform: translateY(-5px);
            transition: 0.3s;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15) !important;
        }
    </style>
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-6">
                <div class="card shadow-lg">
                    <img src="https://placeholder.apptor.studio/400/300/laptop.png" class="card-img-top" alt="Ноутбук">
                    <div class="card-body">
                        <span class="badge bg-warning mb-2">★★★★☆ 4.5</span>
                        <h5 class="card-title">Игровой ноутбук</h5>
                        <p class="card-text">Мощный ноутбук для работы и игр</p>
                        <p class="display-6">89 990 ₽</p>
                        <a href="#" class="btn btn-success w-100">Купить</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
